<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเข้าสู่ระบบลงทะเบียน VIP - Automotown</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Sarabun", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 400px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 20px;
      color: #ff6b00;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #666;
      margin: 8px 0;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #ff6b00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #c62828;
      background: #ffebee;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon">🏆</div>
  <h1>กำลังเข้าสู่ระบบ VIP Club</h1>
  <div class="spinner"></div>
  <p>กรุณารอสักครู่...</p>
  <div id="error" class="error" style="display:none;"></div>
</div>

<script>
  // ========== แก้ 2 ค่าตรงนี้ ==========
  const LIFF_ID = "2010135227-vA5tVcyB";
  const SOFTR_URL = "https://www.automotown.com//vip-registration";
  // =====================================

  function showError(msg) {
    document.getElementById('error').textContent = msg;
    document.getElementById('error').style.display = 'block';
  }

  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      return liff.getProfile();
    })
    .then(profile => {
      if (!profile) return;
      const params = new URLSearchParams({
        line_user_id: profile.userId,
        name: profile.displayName || ''
      });
      window.location.replace(`${SOFTR_URL}?${params.toString()}`);
    })
    .catch(err => {
      console.error(err);
      showError('ไม่สามารถเชื่อมต่อ LINE ได้ กรุณาเปิดผ่านแอป LINE');
    });
</script>

</body>
</html>
